<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/img/Logo.jpg" type="image/x-icon">
</head>

<body>
    <div class="Parent">
        <div class="TitleDiv">
            <p class="Title">Rock Paper Scissors Game</p>
        </div>

        <div class="ScoreDiv">
            <p class="Left-Score">PLAYER SCORE: 0</p>
            <div class="res-btn">
                <button id="res">Reset Button</button>
            </div>
            <p class="Right-Score">COMPUTER SCORE: 0</p>
        </div>

        <div class="winning-title-div">
            <p class="winning-title"></p>
        </div>

        <div class="imgs-Div">
            <div class="left-Board">
                <img src="assets/img/Left-3.png" alt="" class="left rock leftimg" id="rock">
            </div>

            <div class="span">
                <span class="vs">VS</span>
            </div>

            <div class="right-Board">
                <img src="assets/img/Right-3.png" alt="" class="right">
            </div>
        </div>

        <div class="instructionDiv">
            <p class="instruction">Choose your move, Rock Paper or Scissors?</p>
        </div>

        <div class="buttons">
            <button class="impbtn rockbtn">ROCK</button>
            <button class="impbtn paperbtn">PAPER</button>
            <button class="impbtn scissorsbtn">SCISSORS</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
